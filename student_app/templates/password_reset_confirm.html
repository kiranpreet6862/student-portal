{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="icon" type="image/x-icon" href="{% static 'images/favicon.ico' %}">
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="auth-box">
        <h2>Reset Password</h2>

        <form method="POST">
            {% csrf_token %}            
            <div class="password-field">
                <label>New Password</label>
                {{ form.new_password1 }}
                <span class="toggle-eye" onclick="togglePassword('id_new_password1', this)"><i class="fa-solid fa-eye-slash"></i></span>
            </div>

            <div class="password-field">
                <label>Confirm Password</label>
                {{ form.new_password2 }}
                <span class="toggle-eye" onclick="togglePassword('id_new_password2', this)"><i class="fa-solid fa-eye-slash"></i></span>
            </div>

            <button type="submit">Reset Password</button>
            {% if form.errors %}
            <div class="error-box">
                {% for field in form %}
                    {% for error in field.errors %}
                        <p>⚠️ {{ error }}</p>
                    {% endfor %}
                {% endfor %}
            </div>
            {% endif %}
        </form>
    </div>
    <script>
        function togglePassword(fieldId, icon) {
        const input = document.getElementById(fieldId);
        const i = icon.querySelector("i");

            if (input.type === "password") {
                input.type = "text";
                i.classList.remove("fa-eye-slash");
                i.classList.add("fa-eye");
            } else {
                input.type = "password";
                i.classList.remove("fa-eye");
                i.classList.add("fa-eye-slash");
            }
        }
    </script>

</body>
</html>
